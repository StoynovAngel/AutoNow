spring.datasource.url=jdbc:h2:mem:autonow-test;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.sql.init.mode=never
spring.docker.compose.enabled=false

jwt.secret=secret-for-tests
jwt.algorithm=HmacSHA256
jwt.expiration=3600000

pricing.base-fare=2.50
pricing.rate-per-km=1.20
pricing.xl-multiplier=1.30
pricing.premium-multiplier=1.60
pricing.night-multiplier=1.20
pricing.night-start-hour=22
pricing.night-end-hour=6
pricing.timezone=Europe/Sofia
pricing.currency=EUR

springdoc.swagger-ui.enabled=false

