spring.application.name=autonow

spring.config.import=optional:file:.env[.properties]

spring.docker.compose.enabled=false

spring.datasource.url=jdbc:postgresql://localhost:5432/autoNow
spring.datasource.username=postgres
spring.datasource.password=12345

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.sql.init.mode=never

jwt.secret=8f92c3b2a9e44c8e9d6f1c4e7b2a91c8a3f5d6e8c9b1a2e4f7d8c9a1b2c3
jwt.algorithm=HS256
jwt.expiration=3600000

cors.allowed.origins=http://localhost:3000,http://localhost:8080,http://localhost:8081,http://10.0.2.2:8080,http://10.0.2.2:8081

spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY:}
