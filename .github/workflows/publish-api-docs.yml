name: Publish API Docs

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-openapi:
    # Skip if the push was made by github-actions bot (to prevent infinite loops when merging docs PRs)
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: autoNow
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_HOST_AUTH_METHOD: scram-sha-256
          POSTGRES_INITDB_ARGS: --auth-host=scram-sha-256
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Start backend
        working-directory: backend
        env:
          DB_URL: jdbc:postgresql://localhost:5432/autoNow
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: dummy-secret-for-docs
          JWT_ALGORITHM: HS256
          JWT_EXPIRATION: 3600000
          CORS_ALLOWED_ORIGINS: http://localhost:3000
        run: |
          java -jar target/*.jar &
          echo $! > app.pid
          sleep 20

      - name: Fetch OpenAPI spec
        run: |
          curl http://localhost:8080/v3/api-docs.yaml -o docs/openapi.yaml

      - name: Stop backend
        run: |
          kill $(cat backend/app.pid)

      - name: Install swagger-cli
        run: npm install -g swagger-cli

      - name: Normalize OpenAPI spec
        run: |
          swagger-cli bundle docs/openapi.yaml \
            --outfile docs/openapi.yaml \
            --type yaml

      - name: Commit and push docs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet docs/openapi.yaml; then
            echo "No changes to OpenAPI docs"
            exit 0
          fi

          BRANCH_NAME="docs/update-openapi-$(date +%s)"

          git checkout -b "$BRANCH_NAME"
          git add docs/openapi.yaml
          git commit -m "Update API docs"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "Update OpenAPI documentation" \
            --body "Automated update of OpenAPI specification from main branch build." \
            --base main \
            --head "$BRANCH_NAME"