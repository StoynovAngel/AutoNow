name: Publish API Docs

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  generate-openapi:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: autoNow
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Start backend
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/autoNow
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: dummy-secret-for-docs
          JWT_ALGORITHM: HS256
          JWT_EXPIRATION: 3600000
        run: |
          java -jar target/*.jar &
          echo $! > app.pid
          sleep 20

      - name: Fetch OpenAPI spec
        run: |
          curl http://localhost:8081/v3/api-docs.yaml -o docs/openapi.yaml

      - name: Stop backend
        run: |
          kill $(cat backend/app.pid)

      - name: Install swagger-cli
        run: npm install -g swagger-cli

      - name: Normalize OpenAPI spec
        run: |
          swagger-cli bundle docs/openapi.yaml \
            --outfile docs/openapi.yaml \
            --type yaml

      - name: Commit and push docs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git diff --quiet && echo "No changes" && exit 0

          BRANCH_NAME="docs/update-openapi-$(date +%s)"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH_NAME"
          git add docs/openapi.yaml
          git commit -m "Update API docs"
          git push origin "$BRANCH_NAME"

          gh pr create \
            --title "Update OpenAPI documentation" \
            --body "Automated update of OpenAPI specification from main branch build." \
            --base main \
            --head "$BRANCH_NAME"