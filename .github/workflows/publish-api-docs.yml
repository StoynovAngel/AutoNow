name: Publish API Docs

on:
  push:
    branches: [ "main" ]

jobs:
  generate-openapi:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: autoNow
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build backend
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Start backend
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/autoNow
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          JWT_SECRET: dummy-secret-for-docs
          JWT_ALGORITHM: HS256
          JWT_EXPIRATION: 3600000
        run: |
          java -jar target/*.jar &
          echo $! > app.pid
          sleep 20

      - name: Fetch OpenAPI spec
        run: |
          curl http://localhost:8080/v3/api-docs.yaml -o docs/openapi.yaml

      - name: Stop backend
        run: |
          kill $(cat backend/app.pid)

      - name: Commit and push docs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/openapi.yaml
          git commit -m "Update API docs" || echo "No changes"
          git push