name: release-artifacts

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  backend:
    name: Build backend jar
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build jar
        working-directory: backend
        run: ./mvnw -B -DskipTests package

      - name: Rename artifact
        working-directory: backend/target
        run: |
          JAR=$(ls *.jar | grep -v 'sources\|javadoc\|original' | head -n1)
          cp "$JAR" "autonow-backend-${{ github.event.release.tag_name }}.jar"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "backend/target/autonow-backend-${{ github.event.release.tag_name }}.jar" \
            --clobber

  web:
    name: Build web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Zip dist
        working-directory: web
        run: zip -r "autonow-web-${{ github.event.release.tag_name }}.zip" dist

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "web/autonow-web-${{ github.event.release.tag_name }}.zip" \
            --clobber

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Expo prebuild (android)
        working-directory: frontend
        run: npx expo prebuild --platform android --no-install --non-interactive

      - name: Build release APK (debug-signed)
        working-directory: frontend/android
        run: ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a,armeabi-v7a

      - name: Locate and rename APK
        working-directory: frontend
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n1)
          cp "$APK" "autonow-mobile-${{ github.event.release.tag_name }}.apk"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "frontend/autonow-mobile-${{ github.event.release.tag_name }}.apk" \
            --clobber
