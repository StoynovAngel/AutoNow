          type: integer
          format: int32
        vehicleType:
          type: string
          enum:
            - TAXI
            - SEMI
            - AMBULANCE
            - RENTAL
            - PROM
            - FUNERAL
        companyId:
          type: integer
          format: int64
        driverPhoneNumber:
          type: string
