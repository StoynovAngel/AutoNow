components:
  schemas:
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
          format: int32
        detail:
          type: string
        instance:
          type: string
          format: uri
        properties:
          type: object
          additionalProperties: {}
    VehicleRequestDTO:
      type: object
      properties:
        brand:
          type: string
          minLength: 1
        model:
          type: string
          minLength: 1
        imageURL:
          type: string
        airConditioning:
          type: boolean
        numberOfSeats:
          type: integer
          format: int32
        trunkCapacity:
          type: number
          format: double
        vehicleType:
          type: string
          enum:
            - TAXI
            - SEMI
            - AMBULANCE
        companyId:
          type: integer
          format: int64
      required:
        - brand
        - model
        - vehicleType
    VehicleResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        brand:
          type: string
        model:
          type: string
        imageURL:
          type: string
        airConditioning:
          type: boolean
        numberOfSeats:
          type: integer
          format: int32
        trunkCapacity:
          type: number
          format: double
        vehicleType:
          type: string
          enum:
            - TAXI
            - SEMI
            - AMBULANCE
        companyId:
          type: integer
          format: int64
    RatingRequestDTO:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
        rating:
          type: integer
          format: int32
          maximum: 5
          minimum: 1
        comment:
          type: string
          maxLength: 1000
          minLength: 0
      required:
        - orderId
        - rating
    RatingResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderId:
          type: integer
          format: int64
        rating:
          type: integer
          format: int32
        comment:
          type: string
        createdAt:
          type: string
          format: date-time
    PaymentRequestDTO:
      type: object
      properties:
        orderId:
          type: integer
          format: int64
        amount:
          type: number
          format: double
        paymentMethod:
          type: string
          enum:
            - CASH
            - CREDIT_CARD
            - DEBIT_CARD
            - PAYPAL
            - GOOGLE_PAY
            - APPLE_PAY
        transactionId:
          type: string
        currency:
          type: string
      required:
        - amount
        - orderId
        - paymentMethod
    PaymentResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderId:
          type: integer
          format: int64
        amount:
          type: number
          format: double
        paymentMethod:
          type: string
          enum:
            - CASH
            - CREDIT_CARD
            - DEBIT_CARD
            - PAYPAL
            - GOOGLE_PAY
            - APPLE_PAY
        status:
          type: string
          enum:
            - PENDING
            - COMPLETED
            - FAILED
            - REFUNDED
        transactionId:
          type: string
        currency:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    OrderRequestDTO:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        driverId:
          type: integer
          format: int64
        vehicleId:
          type: integer
          format: int64
        vehicleType:
          type: string
          enum:
            - TAXI
            - SEMI
            - AMBULANCE
        pickupAddress:
          type: string
          minLength: 1
        pickupLatitude:
          type: number
          format: double
        pickupLongitude:
          type: number
          format: double
        dropoffAddress:
          type: string
          minLength: 1
        dropoffLatitude:
          type: number
          format: double
        dropoffLongitude:
          type: number
          format: double
        estimatedPrice:
          type: number
          format: double
        distanceKm:
          type: number
          format: double
        estimatedDurationMinutes:
          type: integer
          format: int32
        specialRequirements:
          type: string
      required:
        - dropoffAddress
        - dropoffLatitude
        - dropoffLongitude
        - pickupAddress
        - pickupLatitude
        - pickupLongitude
        - userId
        - vehicleType
    OrderResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        driverId:
          type: integer
          format: int64
        vehicleId:
          type: integer
          format: int64
        vehicleType:
          type: string
          enum:
            - TAXI
            - SEMI
            - AMBULANCE
        pickupAddress:
          type: string
        pickupLatitude:
          type: number
          format: double
        pickupLongitude:
          type: number
          format: double
        dropoffAddress:
          type: string
        dropoffLatitude:
          type: number
          format: double
        dropoffLongitude:
          type: number
          format: double
        status:
          type: string
          enum:
            - CREATED
            - ACCEPTED
            - IN_PROGRESS
            - COMPLETED
            - CANCELED
        estimatedPrice:
          type: number
          format: double
        finalPrice:
          type: number
          format: double
        distanceKm:
          type: number
          format: double
        estimatedDurationMinutes:
          type: integer
          format: int32
        specialRequirements:
          type: string
        cancellationReason:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    DriverRequestDTO:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
        lastName:
          type: string
          minLength: 1
        phoneNumber:
          type: string
          minLength: 1
          pattern: '^\+?[0-9]{10,15}$'
        licenseNumber:
          type: string
          minLength: 1
        expertiseType:
          type: string
          enum:
            - B
            - C
            - CE
        available:
          type: boolean
        imageUrl:
          type: string
        companyId:
          type: integer
          format: int64
      required:
        - expertiseType
        - firstName
        - lastName
        - licenseNumber
        - phoneNumber
    DriverResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        firstName:
          type: string
        lastName:
          type: string
        phoneNumber:
          type: string
        licenseNumber:
          type: string
        expertiseType:
          type: string
          enum:
            - B
            - C
            - CE
        available:
          type: boolean
        imageUrl:
          type: string
        companyId:
          type: integer
          format: int64
        vehicleIds:
          type: array
          items:
            type: integer
            format: int64
          uniqueItems: true
    CompanyRequestDTO:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        address:
          type: string
          minLength: 1
        phone:
          type: string
          minLength: 1
          pattern: '^\+?[0-9]{10,15}$'
        email:
          type: string
          format: email
          minLength: 1
        logoUrl:
          type: string
        description:
          type: string
          maxLength: 1000
          minLength: 0
        companyType:
          type: string
          enum:
            - TAXI
            - LOGISTICS
            - AMBULANCE
            - RENTAL
            - FUNERAL
            - PROM
      required:
        - address
        - companyType
        - email
        - name
        - phone
    CompanyResponseDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        logoUrl:
          type: string
        description:
          type: string
        companyType:
          type: string
          enum:
            - TAXI
            - LOGISTICS
            - AMBULANCE
            - RENTAL
            - FUNERAL
            - PROM
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    JwtResponse:
      type: object
      properties:
        token:
          type: string
    UserRequestDTO:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          pattern: '^(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}$'
